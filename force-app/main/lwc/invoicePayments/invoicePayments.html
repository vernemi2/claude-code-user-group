<template>
  <lightning-card title="Payments" icon-name="standard:payment_gateway">
    <template lwc:if={isFormDisabled}>
      <div class="slds-p-around_medium">
        <div
          class="slds-notify slds-notify_alert slds-alert_warning"
          role="alert"
        >
          <span class="slds-assistive-text">info</span>
          <lightning-icon
            icon-name="utility:info"
            alternative-text="info"
            size="x-small"
            class="slds-m-right_x-small"
          ></lightning-icon>
          <h2>{disabledMessage}</h2>
        </div>
      </div>
    </template>

    <template lwc:if={isFullyPaid}>
      <div class="slds-p-around_medium">
        <div
          class="slds-notify slds-notify_alert slds-alert_texture"
          role="alert"
        >
          <span class="slds-assistive-text">info</span>
          <lightning-icon
            icon-name="utility:check"
            alternative-text="paid"
            variant="success"
            size="x-small"
            class="slds-m-right_x-small"
          ></lightning-icon>
          <h2>This invoice is fully paid.</h2>
        </div>
      </div>
    </template>

    <template lwc:if={showForm}>
      <div class="slds-p-around_medium">
        <p class="slds-text-body_regular slds-m-bottom_small">
          Remaining balance: <strong>{formattedBalance}</strong>
        </p>
        <div class="slds-grid slds-wrap slds-gutters">
          <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
            <lightning-input
              type="number"
              label="Amount"
              value={amount}
              formatter="currency"
              step="0.01"
              required
              onchange={handleAmountChange}
            ></lightning-input>
          </div>
          <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
            <lightning-input
              type="date"
              label="Payment Date"
              value={paymentDate}
              required
              onchange={handleDateChange}
            ></lightning-input>
          </div>
          <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
            <lightning-combobox
              label="Payment Method"
              value={paymentMethod}
              options={paymentMethodOptions}
              onchange={handleMethodChange}
            ></lightning-combobox>
          </div>
          <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
            <lightning-input
              type="text"
              label="Reference Number"
              value={referenceNumber}
              onchange={handleReferenceChange}
            ></lightning-input>
          </div>
        </div>
        <lightning-button
          variant="brand"
          label="Record Payment"
          onclick={handleSubmit}
          disabled={isSubmitDisabled}
          class="slds-m-top_small"
        ></lightning-button>
      </div>
    </template>

    <template lwc:if={hasPayments}>
      <div class="slds-p-around_medium slds-border_top">
        <h3 class="slds-text-heading_small slds-m-bottom_small">
          Payment History
        </h3>
        <lightning-datatable
          key-field="Id"
          data={payments}
          columns={columns}
          hide-checkbox-column
        ></lightning-datatable>
      </div>
    </template>
  </lightning-card>
</template>
